<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSS - Žádost o spolupráci</title>
    <style>
        :root {
            --canvas: #efe8dc;
            --panel: rgba(255, 251, 245, 0.94);
            --panel-border: rgba(75, 56, 37, 0.12);
            --text: #261b14;
            --muted: #6f5a49;
            --accent: #0f7b69;
            --accent-strong: #0a5f52;
            --accent-soft: rgba(15, 123, 105, 0.12);
            --warm: #b67a35;
            --danger: #b64f42;
            --shadow: 0 28px 64px rgba(38, 27, 20, 0.16);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 28px 16px 40px;
            color: var(--text);
            font-family: "Segoe UI", "Inter", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 123, 105, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(182, 122, 53, 0.16), transparent 26%),
                linear-gradient(150deg, #f7f1e6 0%, #eadcc6 100%);
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 14px;
        }

        .app-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(75, 56, 37, 0.1);
            color: var(--accent-strong);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(38, 27, 20, 0.08);
        }

        .app-link svg {
            width: 16px;
            height: 16px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(16px);
        }

        .hero {
            padding: 30px 34px 20px;
            background:
                radial-gradient(circle at top right, rgba(15, 123, 105, 0.14), transparent 30%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0));
            border-bottom: 1px solid rgba(75, 56, 37, 0.08);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 16px 0 0;
            font-size: clamp(34px, 5vw, 52px);
            line-height: 1.02;
        }

        .content {
            padding: 28px 34px 34px;
        }

        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .type-btn {
            border: 1px solid rgba(75, 56, 37, 0.12);
            background: rgba(255, 255, 255, 0.7);
            color: var(--muted);
            border-radius: 20px;
            padding: 14px 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .type-btn strong {
            display: block;
            color: var(--text);
            font-size: 16px;
        }

        .type-btn:hover,
        .type-btn.active {
            transform: translateY(-1px);
            border-color: rgba(15, 123, 105, 0.28);
            background: linear-gradient(180deg, rgba(15, 123, 105, 0.12), rgba(255, 255, 255, 0.92));
            box-shadow: 0 14px 24px rgba(15, 123, 105, 0.12);
        }

        .type-btn.active strong {
            color: var(--accent-strong);
        }

        .message {
            display: none;
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.65;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(15, 123, 105, 0.1);
            color: var(--accent-strong);
            border: 1px solid rgba(15, 123, 105, 0.18);
        }

        .message.error {
            background: rgba(182, 79, 66, 0.1);
            color: var(--danger);
            border: 1px solid rgba(182, 79, 66, 0.18);
        }

        .section-card {
            margin-top: 22px;
            padding: 22px;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.56);
            border: 1px solid rgba(75, 56, 37, 0.08);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-head h2 {
            margin: 0;
            font-size: 22px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(75, 56, 37, 0.1);
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .pill.subtle {
            color: var(--warm);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 13px;
            font-weight: 700;
            color: #4d3b2d;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid rgba(75, 56, 37, 0.14);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            padding: 13px 14px;
            font-size: 14px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .industry-picker {
            position: relative;
        }

        .industry-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid rgba(75, 56, 37, 0.14);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            padding: 13px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .industry-trigger.placeholder {
            color: var(--muted);
        }

        .industry-trigger::after {
            content: "▾";
            color: var(--muted);
            font-size: 12px;
            flex: 0 0 auto;
        }

        .industry-picker.open .industry-trigger,
        .industry-trigger:hover {
            border-color: rgba(15, 123, 105, 0.44);
            box-shadow: 0 0 0 4px rgba(15, 123, 105, 0.08);
        }

        .industry-panel {
            display: none;
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 8px);
            z-index: 30;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid rgba(75, 56, 37, 0.12);
            background: rgba(255, 251, 245, 0.98);
            box-shadow: 0 18px 36px rgba(38, 27, 20, 0.18);
        }

        .industry-picker.open .industry-panel {
            display: block;
        }

        .industry-search {
            margin-bottom: 10px;
        }

        .industry-groups {
            max-height: 280px;
            overflow: auto;
            display: grid;
            gap: 10px;
            padding-right: 2px;
        }

        .industry-group {
            display: grid;
            gap: 8px;
        }

        .industry-group-title {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--warm);
            padding: 0 4px;
        }

        .industry-options {
            display: grid;
            gap: 6px;
        }

        .industry-option {
            width: 100%;
            border: 1px solid rgba(75, 56, 37, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.84);
            color: var(--text);
            text-align: left;
            padding: 9px 10px;
            font-size: 13px;
            cursor: pointer;
        }

        .industry-option:hover,
        .industry-option.active {
            border-color: rgba(15, 123, 105, 0.24);
            background: rgba(15, 123, 105, 0.1);
            color: var(--accent-strong);
        }

        .industry-empty {
            padding: 12px 8px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(15, 123, 105, 0.44);
            box-shadow: 0 0 0 4px rgba(15, 123, 105, 0.12);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 18px;
            border-radius: 18px;
            background: var(--accent-soft);
            margin-bottom: 16px;
        }

        .switch {
            position: relative;
            width: 58px;
            height: 32px;
            flex: 0 0 auto;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: rgba(38, 27, 20, 0.18);
            border-radius: 999px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            left: 4px;
            top: 4px;
            border-radius: 50%;
            background: white;
            transition: 0.2s ease;
            box-shadow: 0 6px 14px rgba(38, 27, 20, 0.16);
        }

        .switch input:checked + .slider {
            background: var(--accent);
        }

        .switch input:checked + .slider::before {
            transform: translateX(26px);
        }

        .commission-fields {
            display: none;
        }

        .commission-fields.visible {
            display: block;
        }

        .checkbox-card {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(75, 56, 37, 0.08);
        }

        .checkbox-card input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex: 0 0 auto;
        }

        .checkbox-card strong {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .checkbox-card span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .submit-btn {
            width: 100%;
            margin-top: 24px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), #14856f);
            color: white;
            padding: 16px 18px;
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 18px 28px rgba(15, 123, 105, 0.2);
        }

        .submit-btn strong {
            display: block;
            font-size: 16px;
            font-weight: 800;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.72;
            cursor: not-allowed;
            transform: none;
        }

        .required {
            color: var(--danger);
        }

        @media (max-width: 920px) {
            .type-selector,
            .grid {
                grid-template-columns: 1fr;
            }

            .hero,
            .content {
                padding: 24px 20px;
            }

            .section-head,
            .toggle-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .industry-panel {
                position: fixed;
                left: 16px;
                right: 16px;
                top: auto;
            }

            .topbar {
                justify-content: stretch;
            }

            .app-link {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="topbar">
            <a href="https://app.waltersystem.cz" class="app-link" title="Aplikace" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>Aplikace Walter System</span>
            </a>
        </div>

        <div class="panel">
            <div class="hero">
                <div class="eyebrow">Walter System</div>
                <h1>Žádost o spolupráci</h1>
            </div>

            <div class="content">
                <div id="message" class="message"></div>

                <div class="type-selector">
                    <button type="button" class="type-btn active" data-type="client">
                        <strong>Klient</strong>
                    </button>
                    <button type="button" class="type-btn" data-type="partner">
                        <strong>Partner</strong>
                    </button>
                    <button type="button" class="type-btn" data-type="tiper">
                        <strong>Tipař</strong>
                    </button>
                </div>

                <form id="submissionForm">
                    <section class="section-card">
                        <div class="section-head">
                            <h2>Profil subjektu</h2>
                            <div class="pill" id="entityBadge">Subjekt</div>
                        </div>
                        <div class="grid" id="entityFields"></div>
                    </section>

                    <section class="section-card">
                        <div class="toggle-row">
                            <strong>Přidat i zakázku</strong>
                            <label class="switch" aria-label="Přidat zakázku">
                                <input type="checkbox" id="includeCommission">
                                <span class="slider"></span>
                            </label>
                        </div>

                        <div id="commissionFields" class="commission-fields">
                            <div class="section-head">
                                <h2>Profil zakázky</h2>
                                <div class="pill subtle">Zakázka</div>
                            </div>
                            <div class="grid" id="commissionGrid"></div>
                        </div>
                    </section>

                    <button type="submit" class="submit-btn">
                        <strong id="submitTitle">Odeslat</strong>
                    </button>
                </form>
            </div>
        </div>
    </div>



    <script>
        (async () => {
        const API_BASE_URL = ["localhost", "127.0.0.1"].includes(window.location.hostname)
            ? "http://localhost:3004"
            : "https://api.waltersystem.cz";

        let GROUPED_FIELD_OPTIONS = [];

        try {
            const fieldOptionsResponse = await fetch("./field-options.json");
            if (!fieldOptionsResponse.ok) {
                throw new Error(`HTTP ${fieldOptionsResponse.status}`);
            }

            const fieldOptionsPayload = await fieldOptionsResponse.json();
            GROUPED_FIELD_OPTIONS = Array.isArray(fieldOptionsPayload)
                ? fieldOptionsPayload.map((group) => ({
                    ...group,
                    options: Array.isArray(group.options)
                        ? group.options.map((option) => ({ value: option, label: option }))
                        : []
                }))
                : [];
        } catch (error) {
            console.error("Failed to load field options:", error);
        }

        const PRIORITY_OPTIONS = ["Nízká", "Střední", "Vysoká", "Urgentní"];

        const entityFieldBase = [
            { key: "first_name", label: "Jméno", placeholder: "Např. Jan", required: false },
            { key: "last_name", label: "Příjmení", placeholder: "Např. Novák", required: false },
            { key: "company_name", label: "Společnost", placeholder: "Např. Walter Consulting", required: false },
            { key: "field", label: "Obor", placeholder: "Např. IT, finance, energetika", list: "fieldSuggestions" },
            { key: "location", label: "Lokalita", placeholder: "Např. Praha / Brno / remote" },
            { key: "phone", label: "Telefon", type: "tel", placeholder: "+420 777 123 456" },
            { key: "email", label: "E-mail", type: "email", placeholder: "kontakt@firma.cz" },
            { key: "website", label: "Web", type: "url", placeholder: "https://www.example.com" },
            { key: "info", label: "Info / poznámky", type: "textarea", placeholder: "Kontext, specializace, preference nebo další detaily.", fullWidth: true }
        ];

        const commissionFieldBase = [
            { key: "position", label: "Zakázka / pozice", placeholder: "Např. Senior obchodník" },
            { key: "service_position", label: "Typ služby", placeholder: "Např. recruiting, outsourcing, konzultace" },
            { key: "assigned_to", label: "Přiřazeno komu", placeholder: "Např. David / Sales team" },
            { key: "budget", label: "Rozpočet / hodnota", placeholder: "Např. 120 000 CZK" },
            { key: "commission_value", label: "Provize", placeholder: "Např. 15 %" },
            { key: "priority", label: "Priorita", type: "select", options: PRIORITY_OPTIONS },
            { key: "state", label: "Stav", placeholder: "Např. nové zadání" },
            { key: "deadline", label: "Termín", type: "date" },
            { key: "notes", label: "Poznámky", type: "textarea", placeholder: "Interní poznámky nebo doplnění k workflow.", fullWidth: true },
            {
                key: "is_tipped",
                label: "Označit jako tipnutou zakázku",
                type: "checkbox",
                fullWidth: true,
                hint: ""
            }
        ];

        const TYPE_CONFIG = {
            client: {
                label: "Klient",
                entityFields: [
                    ...entityFieldBase.slice(0, 4),
                    { key: "service", label: "Požadovaná služba", placeholder: "Např. recruitment, executive search" },
                    { key: "budget", label: "Rozpočet subjektu", placeholder: "Např. 500 000 CZK" },
                    ...entityFieldBase.slice(4)
                ],
                commissionFields: commissionFieldBase.map((field) => field.key === "position" ? { ...field, label: "Zakázka / poptávka" } : field)
            },
            partner: {
                label: "Partner",
                entityFields: entityFieldBase,
                commissionFields: commissionFieldBase
            },
            tiper: {
                label: "Tipař",
                entityFields: entityFieldBase,
                commissionFields: commissionFieldBase.map((field) => field.key === "position" ? { ...field, label: "Tip / zakázka" } : field)
            }
        };

        let currentType = "client";

        const form = document.getElementById("submissionForm");
        const messageEl = document.getElementById("message");
        const typeButtons = document.querySelectorAll(".type-btn");
        const includeCommission = document.getElementById("includeCommission");
        const commissionFields = document.getElementById("commissionFields");
        const entityFieldsContainer = document.getElementById("entityFields");
        const commissionGrid = document.getElementById("commissionGrid");
        const entityBadge = document.getElementById("entityBadge");

        const trimToNull = (value) => {
            const trimmed = String(value || "").trim();
            return trimmed ? trimmed : null;
        };

        const normalizeSearchValue = (value) => String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase();

        const hasMeaningfulPayload = (payload) => {
            if (!payload || typeof payload !== "object") return false;
            return Object.values(payload).some((value) => value !== null && value !== undefined && value !== false && String(value).trim() !== "");
        };

        const createOptionMarkup = (values) => values.map((value) => `<option value="${value.replace(/"/g, "&quot;")}"></option>`).join("");

        const showMessage = (html, type) => {
            messageEl.innerHTML = html;
            messageEl.className = `message ${type} show`;
        };

        const resetMessage = () => {
            messageEl.className = "message";
            messageEl.textContent = "";
        };

        const getFieldId = (scope, key) => `${scope}-${key}`;

        const renderField = (scope, field) => {
            const id = getFieldId(scope, field.key);
            const classes = ["form-group"];
            if (field.fullWidth) classes.push("full-width");

            if (field.type === "checkbox") {
                return `
                    <div class="${classes.join(" ")}">
                        <label class="checkbox-card" for="${id}">
                            <input type="checkbox" id="${id}" name="${field.key}">
                            <span>
                                <strong>${field.label}</strong>
                                <span>${field.hint || ""}</span>
                            </span>
                        </label>
                    </div>
                `;
            }

            const requiredMarkup = field.required ? ' <span class="required">*</span>' : "";
            const commonAttrs = [
                `id="${id}"`,
                `name="${field.key}"`,
                field.placeholder ? `placeholder="${field.placeholder.replace(/"/g, "&quot;")}"` : "",
                field.list ? `list="${field.list}"` : ""
            ].filter(Boolean).join(" ");

            let control = "";
            if (field.type === "industry") {
                control = `
                    <div class="industry-picker" data-input-id="${id}" data-placeholder="${field.placeholder || "Vyberte obor"}">
                        <input type="hidden" id="${id}" name="${field.key}">
                        <button type="button" class="industry-trigger placeholder">${field.placeholder || "Vyberte obor"}</button>
                        <div class="industry-panel">
                            <input type="text" class="industry-search" placeholder="Hledat obor">
                            <div class="industry-groups"></div>
                        </div>
                    </div>
                `;
            } else if (field.type === "textarea") {
                control = `<textarea ${commonAttrs}></textarea>`;
            } else if (field.type === "select") {
                const options = (field.options || []).map((option) => `<option value="${option}">${option}</option>`).join("");
                control = `<select ${commonAttrs}><option value="">Nevybráno</option>${options}</select>`;
            } else {
                control = `<input type="${field.type || "text"}" ${commonAttrs}>`;
            }

            return `
                <div class="${classes.join(" ")}">
                    <label for="${id}">${field.label}${requiredMarkup}</label>
                    ${control}
                </div>
            `;
        };



        const renderIndustryOptions = (groupsElement, activeValue, query) => {
            const normalizedQuery = normalizeSearchValue(query);
            const markup = GROUPED_FIELD_OPTIONS.map((group) => {
                const options = group.options.filter((option) => normalizeSearchValue(option.label).includes(normalizedQuery));
                if (!options.length) return "";

                return `
                    <div class="industry-group">
                        <div class="industry-group-title">${group.label}</div>
                        <div class="industry-options">
                            ${options.map((option) => `
                                <button type="button" class="industry-option${option.value === activeValue ? " active" : ""}" data-value="${option.value.replace(/"/g, "&quot;")}">${option.label}</button>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");

            groupsElement.innerHTML = markup || '<div class="industry-empty">Žádná shoda</div>';
        };

        const syncIndustryTriggerLabel = (picker) => {
            const hiddenInput = picker.querySelector('input[type="hidden"]');
            const trigger = picker.querySelector('.industry-trigger');
            const placeholder = picker.dataset.placeholder || 'Vyberte obor';
            const value = hiddenInput.value;
            trigger.textContent = value || placeholder;
            trigger.classList.toggle('placeholder', !value);
        };

        const initializeIndustryPickers = () => {
            document.querySelectorAll('.industry-picker').forEach((picker) => {
                const hiddenInput = picker.querySelector('input[type="hidden"]');
                const trigger = picker.querySelector('.industry-trigger');
                const searchInput = picker.querySelector('.industry-search');
                const groupsElement = picker.querySelector('.industry-groups');

                syncIndustryTriggerLabel(picker);
                renderIndustryOptions(groupsElement, hiddenInput.value, '');

                trigger.addEventListener('click', () => {
                    const willOpen = !picker.classList.contains('open');
                    document.querySelectorAll('.industry-picker.open').forEach((openPicker) => openPicker.classList.remove('open'));
                    picker.classList.toggle('open', willOpen);
                    if (willOpen) {
                        searchInput.value = '';
                        renderIndustryOptions(groupsElement, hiddenInput.value, '');
                        searchInput.focus();
                    }
                });

                searchInput.addEventListener('input', () => {
                    renderIndustryOptions(groupsElement, hiddenInput.value, searchInput.value);
                });

                groupsElement.addEventListener('click', (event) => {
                    const option = event.target.closest('.industry-option');
                    if (!option) return;
                    hiddenInput.value = option.dataset.value || '';
                    syncIndustryTriggerLabel(picker);
                    renderIndustryOptions(groupsElement, hiddenInput.value, searchInput.value);
                    picker.classList.remove('open');
                });
            });
        };

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.industry-picker')) {
                document.querySelectorAll('.industry-picker.open').forEach((picker) => picker.classList.remove('open'));
            }
        });

        const renderCurrentType = () => {
            const config = TYPE_CONFIG[currentType];

            entityBadge.textContent = config.label;

            entityFieldsContainer.innerHTML = config.entityFields.map((field) => renderField("entity", field)).join("");
            commissionGrid.innerHTML = config.commissionFields.map((field) => renderField("commission", field)).join("");
            initializeIndustryPickers();

            typeButtons.forEach((button) => {
                button.classList.toggle("active", button.dataset.type === currentType);
            });
        };

        const collectValues = (scope, fields) => {
            return fields.reduce((accumulator, field) => {
                const element = document.getElementById(getFieldId(scope, field.key));
                if (!element) return accumulator;

                if (field.type === "checkbox") {
                    accumulator[field.key] = element.checked;
                    return accumulator;
                }

                accumulator[field.key] = trimToNull(element.value);
                return accumulator;
            }, {});
        };

        entityFieldBase.forEach((field) => {
            if (field.key === 'field') field.type = 'industry';
        });

        renderCurrentType();

        includeCommission.addEventListener("change", () => {
            commissionFields.classList.toggle("visible", includeCommission.checked);
        });

        typeButtons.forEach((button) => {
            button.addEventListener("click", () => {
                currentType = button.dataset.type;
                resetMessage();
                renderCurrentType();
            });
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            resetMessage();

            const config = TYPE_CONFIG[currentType];
            const submitButton = form.querySelector(".submit-btn");
            const submitTitle = document.getElementById("submitTitle");
            submitButton.disabled = true;
            submitTitle.textContent = "Odesílání...";

            const entity = collectValues("entity", config.entityFields);
            const commissionPayload = collectValues("commission", config.commissionFields);
            const commission = includeCommission.checked && hasMeaningfulPayload(commissionPayload) ? commissionPayload : null;

            const hasIdentity = [entity.first_name, entity.last_name, entity.company_name].some(Boolean);
            if (!hasIdentity) {
                submitButton.disabled = false;
                submitTitle.textContent = "Odeslat do schvalování";
                showMessage("Vyplňte prosím alespoň jméno, příjmení nebo název společnosti, aby šel subjekt založit.", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/public-submissions/${currentType}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ entity, commission })
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(payload.error || "Server error");
                }

                const idLines = [
                    payload.entityId ? `Subjekt ID: <strong>${payload.entityId}</strong>` : null,
                    payload.commissionId ? `Zakázka ID: <strong>${payload.commissionId}</strong>` : null
                ].filter(Boolean).join("<br>");

                showMessage(`Žádost byla úspěšně odeslána do schvalování.<br>${idLines}`, "success");
                form.reset();
                includeCommission.checked = false;
                commissionFields.classList.remove("visible");
                renderCurrentType();
            } catch (error) {
                console.error("Error:", error);
                showMessage(`Chyba při odesílání žádosti. ${error.message || "Zkuste to prosím znovu."}`, "error");
            } finally {
                submitButton.disabled = false;
                submitTitle.textContent = "Odeslat do schvalování";
            }
        });
        })();
    </script>
</body>
</html>
